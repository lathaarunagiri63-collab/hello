<!DOCTYPE html>
<html>
<head>
    <title>College Login Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .login-box {
            width: 300px;
            margin: auto;
            margin-top: 100px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 100px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0 5px;
        }

        .college-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="logo.png" alt="College Logo">

    <!-- College Name -->
    <div class="college-name">
        Adhiparasakthi Engineering College
    </div>

    <h2>Student Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
</html>
